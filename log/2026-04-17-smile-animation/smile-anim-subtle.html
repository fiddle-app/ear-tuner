<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smile Animation — Subtle (4px arc)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1612;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: #e8d5b0;
  }
  h2 { font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;
       opacity: 0.5; margin-bottom: 32px; }

  #progress-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    min-height: 60px;
    position: relative;
  }

  .prog-slot {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    /* each slot will be individually translated for the arc */
    transition: transform 0.6s cubic-bezier(0.34, 1.3, 0.64, 1);
  }

  /* Arc offsets for SUBTLE smile — 4px max lift at edges */
  /* 5 slots: indices 0..4. Center (2) stays. Edges (0,4) lift 4px.
     The arc is a cosine: offset[i] = -maxLift * cos(pi * i / (n-1)) + maxLift
     But for a smile, outer slots go UP (negative Y), center stays.
     Remap so center=0, edges= -maxLift.
  */
  #progress-row.smiling .prog-slot:nth-child(1) { transform: translateY(-4px); }
  #progress-row.smiling .prog-slot:nth-child(2) { transform: translateY(-1px); }
  #progress-row.smiling .prog-slot:nth-child(3) { transform: translateY(0px);  }
  #progress-row.smiling .prog-slot:nth-child(4) { transform: translateY(-1px); }
  #progress-row.smiling .prog-slot:nth-child(5) { transform: translateY(-4px); }

  /* Glow on the row when smiling */
  #progress-row.smiling {
    filter: drop-shadow(0 0 6px rgba(100, 230, 120, 0.3));
    transition: filter 0.5s ease;
  }

  .prog-check { animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* Controls */
  .controls { margin-top: 48px; display: flex; gap: 16px; }
  button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    color: #e8d5b0;
    font-size: 13px; letter-spacing: 0.06em;
    padding: 8px 20px; border-radius: 999px;
    cursor: pointer;
  }
  button:hover { background: rgba(255,255,255,0.14); }

  .label {
    font-size: 12px; opacity: 0.4; margin-top: 20px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<h2>Subtle — 4 px arc</h2>

<div id="progress-row">
  <!-- 5 circles: all correct (green checkmarks) -->
  <div class="prog-slot">
    <svg class="prog-check" width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" fill="rgba(60,200,80,0.25)" stroke="rgba(80,220,100,0.70)" stroke-width="1.5"/>
      <path d="M8 14 L12 18 L20 10" stroke="#6fe882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="prog-slot">
    <svg class="prog-check" width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" fill="rgba(60,200,80,0.25)" stroke="rgba(80,220,100,0.70)" stroke-width="1.5"/>
      <path d="M8 14 L12 18 L20 10" stroke="#6fe882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="prog-slot">
    <svg class="prog-check" width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" fill="rgba(60,200,80,0.25)" stroke="rgba(80,220,100,0.70)" stroke-width="1.5"/>
      <path d="M8 14 L12 18 L20 10" stroke="#6fe882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="prog-slot">
    <svg class="prog-check" width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" fill="rgba(60,200,80,0.25)" stroke="rgba(80,220,100,0.70)" stroke-width="1.5"/>
      <path d="M8 14 L12 18 L20 10" stroke="#6fe882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="prog-slot">
    <svg class="prog-check" width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" fill="rgba(60,200,80,0.25)" stroke="rgba(80,220,100,0.70)" stroke-width="1.5"/>
      <path d="M8 14 L12 18 L20 10" stroke="#6fe882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<p class="label">← corners lift 4 px, center unchanged →</p>

<div class="controls">
  <button onclick="triggerSmile()">Trigger Smile</button>
  <button onclick="resetSmile()">Reset</button>
</div>

<script>
function triggerSmile() {
  document.getElementById('progress-row').classList.add('smiling');
}
function resetSmile() {
  document.getElementById('progress-row').classList.remove('smiling');
}

// Auto-demo on load after a short delay
setTimeout(triggerSmile, 800);
</script>
</body>
</html>
