<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ear Tuner — Option B: Obsidian Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;500;600&family=Inter:wght@700;800&family=Nunito:wght@700&display=swap" rel="stylesheet">

<!--
  OPTION B: OBSIDIAN DARK
  ─────────────────────────────────────────────────────────────────────
  A complete redesign in a dark "instrument display" aesthetic.
  Think: high-end chromatic tuner, oscilloscope, rack-mount signal analyzer.

  Design language:
  — Very dark background (#0e0c0a — warm near-black, not cold blue-black)
  — Amber/gold accent (#d4882a) replaces burnt orange as the primary hue
  — Circles read as illuminated gauge faces: dark with colored ring
  — State colors: emerald green for correct, rose red for fail
  — Retest mode: deep navy (#080c18), blue-purple accent (#6b7fff)

  Specific changes vs original:
  1. Background: #0e0c0a (dark warm black) vs #b83c08 orange
  2. Note name font: Inter 800 (same as Option A — proportional looks better)
  3. Accent color: amber #d4882a instead of burnt orange
  4. Circles: amber-tinted glass — dark bg with amber border glow
  5. Correct state: emerald green (#22c55e) — vivid on dark bg
  6. Fail state: rose red (#ef4444) — vivid on dark bg
  7. Phase label / diff label: amber-tinted
  8. Status text: warm off-white rgba(255,240,210,0.88)
  9. Replay button: amber-tinted border
  10. Progress empty slots: amber-tinted circle
  11. Progress check: emerald, cross: rose
  12. Retest mode: navy bg (#080c18), accent shifts blue (#8b9fff)
  13. Start button: amber border + amber text
  14. Subtle noise texture overlay (very faint — instrument screen feel)

  Pros of this direction:
  — Works better in dark environments (less eye strain)
  — "Looks like a tuner" — reinforces what the app does
  — States (correct/fail) are very high contrast on dark bg
  — Amber accent is warm and musical (less code-y than orange)

  Cons:
  — Loses the brand distinctiveness of the orange
  — More "generic dark app" territory
  — Retest mode color distinction is less obvious (navy vs black)

  Use the tabs below to switch between all 5 UI states.
-->

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body { height: 100%; background: #060504; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }

/* ── State switcher bar ── */
.switcher {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 420px;
  display: flex; padding: 10px 12px 8px; gap: 5px; z-index: 1000;
  background: rgba(6,5,4,0.95); backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(212,136,42,0.15);
}
.sw-btn {
  flex: 1; padding: 7px 2px; border-radius: 6px;
  font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; text-align: center; cursor: pointer;
  border: 1px solid rgba(212,136,42,0.15); -webkit-appearance: none;
  background: rgba(212,136,42,0.06); color: rgba(212,136,42,0.38);
  transition: background 0.15s, color 0.15s;
}
.sw-btn.on {
  background: rgba(212,136,42,0.22); color: rgba(255,200,110,0.95);
  border-color: rgba(212,136,42,0.55);
}

/* ── App shell ── */
#app {
  width: 100%; max-width: 390px;
  height: calc(100dvh - 52px); margin-top: 52px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 52px; padding-bottom: 68px;
  font-family: 'Inconsolata', monospace; color: rgba(255,240,210,0.92);
  background-color: #0e0c0a;
  transition: background-color 0.5s ease;
}
#app.state-retest {
  background-color: #080c18;
  color: rgba(200,215,255,0.92);
}

/* Very faint scanline texture — instrument display feel */
#app::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );
}
/* Subtle vignette */
#app::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.45) 100%);
  z-index: 0;
}
#app > * { position: relative; z-index: 1; }

/* ── Phase label: amber tint ── */
.phase-lbl {
  font-size: clamp(18px,5.5vw,24px); font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(212,136,42,0.80); text-align: center; flex-shrink: 0; line-height: 1.2;
}
#app.state-retest .phase-lbl { color: rgba(140,160,255,0.80); }

/* ── Upper half ── */
.upper {
  flex: 1; display: flex; align-items: flex-end; justify-content: center;
  width: 100%; padding-bottom: 10px;
}
.diff-wrap { display: flex; flex-direction: column; align-items: center; }
.diff-val {
  font-family: 'Nunito', sans-serif; font-size: clamp(18px,5.5vw,24px);
  font-weight: 700; color: rgba(212,136,42,0.75); text-align: center; line-height: 1.2;
}
.diff-wrd {
  font-size: clamp(18px,5.5vw,24px); font-weight: 400;
  letter-spacing: 0.22em; color: rgba(212,136,42,0.62); text-align: center;
  padding: 0 20px; line-height: 1.2;
}

/* ── Circles zone ── */
.circles {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; width: 100%; flex-shrink: 0;
}
.note-row { display: flex; align-items: center; justify-content: center; gap: 22px; flex-shrink: 0; }
.nc {
  width: min(138px,37vw); height: min(138px,37vw); border-radius: 50%;
  background: rgba(212,136,42,0.07); border: 2px solid rgba(212,136,42,0.28);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 8px; flex-shrink: 0;
  transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
}
.nc.correct {
  background: rgba(34,197,94,0.14);
  border: 2px solid rgba(34,197,94,0.88);
  box-shadow: 0 0 22px rgba(34,197,94,0.22);
}
.nc.wrong {
  background: rgba(239,68,68,0.14);
  border: 2px solid rgba(239,68,68,0.88);
  box-shadow: 0 0 22px rgba(239,68,68,0.22);
}
.nc.playing {
  background: rgba(212,136,42,0.18);
  border-color: rgba(212,136,42,0.90);
  box-shadow: 0 0 22px rgba(212,136,42,0.22);
}
/* Note name: Inter 800 — same as Option A */
.nc-name {
  font-family: 'Inter', sans-serif;
  font-size: clamp(28px,9vw,42px); font-weight: 800;
  letter-spacing: -0.02em; line-height: 1;
  color: rgba(255,240,210,0.95);
}
.nc.correct .nc-name { color: rgba(180,255,200,0.98); }
.nc.wrong   .nc-name { color: rgba(255,180,175,0.98); }

.nc-det {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(12px,3.3vw,15px); font-weight: 700;
  opacity: 0.65; text-align: center; line-height: 1.2; min-height: 1.2em;
}

/* ── Replay button: amber-tinted ── */
.replay-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(212,136,42,0.08); border: 2px solid rgba(212,136,42,0.38);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-appearance: none; margin-top: 18px; flex-shrink: 0;
}

/* ── Start button: amber ── */
.start-btn {
  background: rgba(212,136,42,0.10); border: 2px solid rgba(212,136,42,0.55);
  border-radius: 999px; color: rgba(255,210,130,0.92);
  font-family: 'Inconsolata', monospace;
  font-size: clamp(22px,7vw,34px); font-weight: 400;
  letter-spacing: 0.18em; padding: 18px 48px; cursor: pointer; -webkit-appearance: none;
  margin-top: 18px;
}

/* ── Lower half ── */
.lower {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start; width: 100%; padding-top: 2px;
}
.prog-row {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin-top: 6px; flex-shrink: 0; min-height: 44px;
}
.prog-slot { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

/* Status: warm off-white */
.status {
  font-size: clamp(15px,4.2vw,18px); font-weight: 300;
  letter-spacing: 0.06em; text-align: center;
  color: rgba(255,240,210,0.82); min-height: 26px; margin-top: 4px;
  transition: color 0.2s; flex-shrink: 0;
}
.status.correct { color: rgba(140,255,175,0.96); }
.status.wrong   { color: rgba(255,165,155,0.96); }

/* Action buttons */
.actions { display: flex; flex-direction: row; gap: 12px; margin-top: 14px; flex-shrink: 0; }
.act-btn {
  -webkit-appearance: none; font-family: 'Inconsolata', monospace;
  font-size: clamp(14px,4vw,17px); font-weight: 400;
  letter-spacing: 0.08em; padding: 10px 22px; border-radius: 999px; cursor: pointer;
  transition: background 0.15s;
}
.act-retry { background: rgba(34,197,94,0.12); border: 1.5px solid rgba(34,197,94,0.38); color: rgba(140,255,175,0.92); }
.act-cont  { background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.70); }

/* Exit retest */
.exit-ret {
  -webkit-appearance: none; font-family: 'Inconsolata', monospace;
  font-size: clamp(12px,3.2vw,14px); letter-spacing: 0.10em;
  padding: 7px 18px; border-radius: 999px; cursor: pointer;
  background: rgba(140,160,255,0.08); border: 1.5px solid rgba(140,160,255,0.28);
  color: rgba(180,195,255,0.72); margin-top: 12px; flex-shrink: 0;
}

/* Corner buttons */
.corner {
  position: absolute; bottom: 0;
  background: none; border: none; color: rgba(212,136,42,0.36);
  padding: 8px; z-index: 10; cursor: pointer; -webkit-appearance: none;
}
.corner.left  { left: 14px; }
.corner.right { right: 14px; }
#app.state-retest .corner { color: rgba(140,160,255,0.36); }

/* Swipe hint */
.swipe-hint {
  position: absolute; bottom: 52px; left: 0; right: 0;
  padding: 0 16px; text-align: center;
  font-family: 'Inconsolata', monospace; font-size: 13px; font-weight: 300;
  color: rgba(255,240,210,0.45); line-height: 1.5; letter-spacing: 0.05em;
  pointer-events: none; z-index: 5;
}
#app.state-retest .swipe-hint { color: rgba(200,215,255,0.40); }

/* Utility */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ── State switcher ── -->
<div class="switcher">
  <button class="sw-btn on" onclick="setState('idle')">Idle</button>
  <button class="sw-btn"    onclick="setState('listen')">Listen</button>
  <button class="sw-btn"    onclick="setState('correct')">Correct</button>
  <button class="sw-btn"    onclick="setState('fail')">Fail</button>
  <button class="sw-btn"    onclick="setState('retest')">Retest</button>
</div>

<!-- ── App ── -->
<div id="app">

  <div class="phase-lbl" id="phase"></div>

  <div class="upper">
    <div class="diff-wrap" id="diff-wrap" style="opacity:0">
      <div class="diff-val">50¢</div>
      <div class="diff-wrd">difference</div>
    </div>
  </div>

  <div class="circles">
    <div class="note-row">
      <div class="nc" id="nc-l">
        <div class="nc-name" id="nc-l-name">?</div>
        <div class="nc-det"  id="nc-l-det"></div>
      </div>
      <div class="nc" id="nc-r">
        <div class="nc-name" id="nc-r-name">?</div>
        <div class="nc-det"  id="nc-r-det"></div>
      </div>
    </div>

    <button class="replay-btn hidden" id="replay-btn" aria-label="Replay">
      <svg width="44" height="44" viewBox="-10 25 1220 1220" fill="rgba(212,136,42,0.85)">
        <path d="m529.2 441.6c-30-18-69.602 3.6016-69.602 39.602v318c0 36 38.398 57.602 69.602 39.602l262.8-158.4c28.801-18 28.801-60 0-78z"/>
        <path d="m1053.6 362.4c-19.199-30-58.801-40.801-88.801-21.602-31.199 19.199-40.801 58.801-21.602 91.199 43.199 70.801 64.801 157.2 56.398 248.4-19.199 193.2-177.6 346.8-372 360-235.2 15.602-430.8-171.6-428.4-404.4 2.3984-216 178.8-393.6 393.6-397.2 12 0 22.801 0 34.801 1.1992v50.398c0 20.398 22.801 32.398 39.602 21.602l187.2-116.4c15.602-9.6016 15.602-33.602 0-43.199l-188.4-118.8c-16.801-10.801-39.602 1.1992-39.602 21.602v52.801c-8.3984-0.003906-16.797-0.003906-26.398-0.003906-306 0-553.2 260.4-529.2 571.2 19.199 260.4 229.2 470.4 488.4 489.6 310.8 22.801 572.4-223.2 572.4-529.2 0.003906-102-28.797-196.8-77.996-277.2z"/>
      </svg>
    </button>

    <button class="start-btn hidden" id="start-btn">Start</button>
  </div>

  <div class="lower">
    <div class="prog-row" id="prog-row"></div>
    <div class="status" id="status">Tap to begin</div>
    <div class="actions hidden" id="actions">
      <button class="act-btn act-retry">Retry</button>
      <button class="act-btn act-cont">Continue</button>
    </div>
    <button class="exit-ret hidden" id="exit-ret">Exit re-test</button>
  </div>

  <div class="swipe-hint hidden" id="swipe-hint">Tap the higher note, or swipe up/down to indicate which is higher.</div>

  <button class="corner left" aria-label="Settings">
    <svg width="36" height="36" viewBox="0 0 100 100" fill="none">
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"
        d="M88 42h-5.8a33 33 0 0 0-3-7.2l4.1-4.1a4 4 0 0 0 0-5.6l-8.4-8.4a4 4 0 0 0-5.6 0l-4.1 4.1A33 33 0 0 0 58 17.8V12a4 4 0 0 0-4-4h-8a4 4 0 0 0-4 4v5.8a33 33 0 0 0-7.2 3l-4.1-4.1a4 4 0 0 0-5.6 0l-8.4 8.4a4 4 0 0 0 0 5.6l4.1 4.1A33 33 0 0 0 17.8 42H12a4 4 0 0 0-4 4v8a4 4 0 0 0 4 4h5.8a33 33 0 0 0 3 7.2l-4.1 4.1a4 4 0 0 0 0 5.6l8.4 8.4a4 4 0 0 0 5.6 0l4.1-4.1a33 33 0 0 0 7.2 3V88a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4v-5.8a33 33 0 0 0 7.2-3l4.1 4.1a4 4 0 0 0 5.6 0l8.4-8.4a4 4 0 0 0 0-5.6l-4.1-4.1a33 33 0 0 0 3-7.2H88a4 4 0 0 0 4-4v-8a4 4 0 0 0-4-4z
        M50 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30z"/>
      <circle cx="50" cy="50" r="10" fill="currentColor"/>
    </svg>
  </button>
  <button class="corner right" aria-label="Info">
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
      <circle cx="19" cy="19" r="17" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <text x="19" y="26.5" text-anchor="middle" font-family="Georgia, serif"
        font-size="21.6" font-style="italic" fill="currentColor">i</text>
    </svg>
  </button>
</div>

<script>
const CHECK_SVG = `<svg width="28" height="28" viewBox="0 0 28 28" fill="none">
  <path d="M5 14 L11 21 L23 9" stroke="rgba(100,240,145,0.95)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;
const CROSS_SVG = `<svg width="28" height="28" viewBox="0 0 28 28" fill="none">
  <path d="M8 8 L20 20M20 8 L8 20" stroke="rgba(255,120,110,0.92)" stroke-width="2.8" stroke-linecap="round"/>
</svg>`;
const EMPTY_SVG = `<svg width="28" height="28" viewBox="0 0 28 28">
  <circle cx="14" cy="14" r="10" stroke="rgba(212,136,42,0.30)" stroke-width="1.8" fill="none"/>
</svg>`;
const EMPTY_SVG_RETEST = `<svg width="28" height="28" viewBox="0 0 28 28">
  <circle cx="14" cy="14" r="10" stroke="rgba(140,160,255,0.30)" stroke-width="1.8" fill="none"/>
</svg>`;

const STATES = {
  idle: {
    appClass: '', phase: '',
    showDiff: false,
    ncL:'?', ncLDet:'', ncLClass:'',
    ncR:'?', ncRDet:'', ncRClass:'',
    showReplay:false, showStart:true,
    prog:[], status:'Tap to begin', statusClass:'',
    showActions:false, showExit:false, showHint:false,
  },
  listen: {
    appClass: '', phase: 'Listen',
    showDiff: false,
    ncL:'?', ncLDet:'', ncLClass:'',
    ncR:'?', ncRDet:'', ncRClass:'',
    showReplay:true, showStart:false,
    prog:['e','e','e'], status:'', statusClass:'',
    showActions:false, showExit:false, showHint:true,
  },
  correct: {
    appClass: '', phase: 'Listen',
    showDiff: true,
    ncL:'G4', ncLDet:'lower', ncLClass:'',
    ncR:'A♭4', ncRDet:'higher', ncRClass:'correct',
    showReplay:true, showStart:false,
    prog:['c','e','e'], status:'Correct', statusClass:'correct',
    showActions:false, showExit:false, showHint:false,
  },
  fail: {
    appClass: '', phase: 'Listen',
    showDiff: true,
    ncL:'G4', ncLDet:'lower', ncLClass:'wrong',
    ncR:'A♭4', ncRDet:'higher', ncRClass:'',
    showReplay:true, showStart:false,
    prog:['c','x'], status:'Try again', statusClass:'wrong',
    showActions:true, showExit:false, showHint:false,
  },
  retest: {
    appClass: 'state-retest', phase: 'Re-Test',
    showDiff: false,
    ncL:'?', ncLDet:'', ncLClass:'',
    ncR:'?', ncRDet:'', ncRClass:'',
    showReplay:true, showStart:false,
    prog:['e','e','e'], status:'D4 · 50¢', statusClass:'',
    showActions:false, showExit:true, showHint:true,
  },
};

function progHTML(slots, isRetest) {
  return slots.map(s => {
    const inner = s==='c' ? CHECK_SVG : s==='x' ? CROSS_SVG : (isRetest ? EMPTY_SVG_RETEST : EMPTY_SVG);
    return `<div class="prog-slot">${inner}</div>`;
  }).join('');
}

function setState(name) {
  const s = STATES[name];
  const app = document.getElementById('app');
  app.className = s.appClass;

  document.getElementById('phase').textContent = s.phase;
  document.getElementById('diff-wrap').style.opacity = s.showDiff ? '1' : '0';

  document.getElementById('nc-l').className = 'nc' + (s.ncLClass ? ' '+s.ncLClass : '');
  document.getElementById('nc-r').className = 'nc' + (s.ncRClass ? ' '+s.ncRClass : '');
  document.getElementById('nc-l-name').textContent = s.ncL;
  document.getElementById('nc-r-name').textContent = s.ncR;
  document.getElementById('nc-l-det').textContent  = s.ncLDet;
  document.getElementById('nc-r-det').textContent  = s.ncRDet;

  document.getElementById('replay-btn').classList.toggle('hidden', !s.showReplay);
  document.getElementById('start-btn').classList.toggle('hidden',  !s.showStart);
  document.getElementById('prog-row').innerHTML = progHTML(s.prog, name==='retest');

  const st = document.getElementById('status');
  st.textContent = s.status;
  st.className = 'status ' + s.statusClass;

  document.getElementById('actions').classList.toggle('hidden', !s.showActions);
  document.getElementById('exit-ret').classList.toggle('hidden', !s.showExit);
  document.getElementById('swipe-hint').classList.toggle('hidden', !s.showHint);

  document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('on'));
  event.currentTarget.classList.add('on');
}
</script>
</body>
</html>
