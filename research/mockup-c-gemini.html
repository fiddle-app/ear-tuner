<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Ear Tuner — Option C: Instrument Grade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;500;600&family=Inter:wght@700;800&display=swap" rel="stylesheet">

<!--
  OPTION C: INSTRUMENT GRADE (GEMINI)
  ─────────────────────────────────────────────────────────────────────
  Identity: "The Digital Luthier" — Professional, Tactile, and Reactive.

  KEY REFINEMENTS:
  1. TYPOGRAPHY: 'Inter 800' for Note Names (Confident & Professional).
     'Inconsolata' for all data points (Cents, Labels, UI Chrome).
     Removed Nunito to unify the "Technical Tool" aesthetic.

  2. DEPTH & TEXTURE: Use of 'backdrop-filter: blur' and subtle inner 
     shadows to make the note circles feel like physical "glass lenses"
     on a high-end tuner.

  3. ENHANCED FEEDBACK: 
     - "Resonance" Pulse: A subtle rhythmic ring when a note is playing.
     - "Spring" Animations: Tactile scale-up on Correct, subtle shake on Wrong.
     - LCD Display: The Diff-Value area now has an "illuminated" feel.

  4. ACCESSIBILITY & EYES-FREE:
     - High-Contrast Status: Pure white text with glowing color states.
     - Defined Trigger Zone: The lower half is visually anchored to 
       reinforce the "Tap Anywhere" instruction.
-->

<style>
:root {
  --orange: #b83c08;
  --green: #0d2a1a;
  --bg-orange: #4d1903;
  --bg-green: #081a10;
  --correct: #2ecc71;
  --wrong: #e74c3c;
  --font-mono: 'Inconsolata', monospace;
  --font-sans: 'Inter', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #000; font-family: var(--font-mono); }

/* ── State Switcher ────────────────────────────────────────── */
.switcher {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; padding: 10px 10px 8px; gap: 4px; z-index: 1000;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sw-btn {
  flex: 1; padding: 8px 2px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15);
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;
}
.sw-btn.active {
  background: var(--orange); color: #fff; border-color: rgba(255,255,255,0.3);
  box-shadow: 0 0 10px rgba(184, 60, 8, 0.4);
}

/* ── App Shell ─────────────────────────────────────────────── */
#app {
  width: 100%; height: 100%; position: relative;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 60px; padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
  background: var(--orange); transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
#app.retest { background: var(--green); }

/* Heavy User-Requested Vignette */
#app::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%);
  z-index: 1;
}
#app > * { position: relative; z-index: 2; }

/* ── Phase Label ───────────────────────────────────────────── */
#phase-label {
  font-size: 20px; letter-spacing: 0.25em; text-transform: uppercase;
  opacity: 0.75; text-align: center; margin-bottom: 10px;
}

/* ── Upper Half (The Display) ──────────────────────────────── */
#upper {
  flex: 1; display: flex; align-items: flex-end; justify-content: center;
  width: 100%; padding-bottom: 20px;
}
.lcd-display {
  background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 24px; border-radius: 12px;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
}
#diff-value {
  font-family: var(--font-sans); font-size: 32px; font-weight: 800;
  color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.4);
}
#diff-word {
  font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
  opacity: 0.5; margin-top: -2px;
}

/* ── Circles Zone ─────────────────────────────────────────── */
#circles {
  flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%;
}
.note-row { display: flex; gap: 24px; align-items: center; }

.note-circle {
  width: min(140px, 38vw); height: min(140px, 38vw); border-radius: 50%;
  background: rgba(255,255,255,0.08); 
  border: 2px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.1);
}

.nc-name { font-family: var(--font-sans); font-size: 42px; font-weight: 800; letter-spacing: -0.02em; }
.nc-detail { font-size: 15px; font-weight: 500; opacity: 0.6; height: 1.2em; margin-top: 2px; }

/* Feedback States */
.playing { 
  background: rgba(255,255,255,0.2); border-color: #fff; 
  box-shadow: 0 0 25px rgba(255,255,255,0.3); transform: scale(1.05);
}
.playing::after {
  content: ''; position: absolute; inset: -10px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);
  animation: pulse-ring 1.2s infinite;
}
@keyframes pulse-ring {
  0% { transform: scale(0.9); opacity: 0.8; }
  100% { transform: scale(1.3); opacity: 0; }
}

.correct { 
  background: rgba(46, 204, 113, 0.4); border-color: var(--correct);
  transform: scale(1.1); box-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
}
.wrong { 
  background: rgba(231, 76, 60, 0.4); border-color: var(--wrong);
  animation: shake 0.4s; box-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

#replay-btn {
  margin-top: 24px; width: 64px; height: 64px; border-radius: 50%;
  background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; color: #fff;
  transition: 0.2s; cursor: pointer;
}
#replay-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }

/* ── Lower Half (Controls) ────────────────────────────────── */
#lower {
  flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center;
}
#progress-row { display: flex; gap: 12px; height: 40px; align-items: center; margin-bottom: 10px; }
.prog-dot { 
  width: 32px; height: 32px; border-radius: 50%; 
  background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.15); 
}
.prog-dot.done { background: var(--correct); border-color: #fff; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }

#status-msg {
  font-size: 18px; font-weight: 500; text-align: center;
  color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  min-height: 24px; padding: 0 20px;
}
.status-correct { color: #a0f0a0 !important; }
.status-wrong { color: #ff9a9a !important; }

#actions { display: none; gap: 12px; margin-top: 20px; }
.btn {
  padding: 12px 32px; border-radius: 999px; font-family: var(--font-mono); font-size: 16px;
  font-weight: 500; letter-spacing: 0.05em; border: none; cursor: pointer; transition: 0.2s;
}
.btn-primary { background: #fff; color: var(--bg-orange); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
.btn-outline { background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
.btn:active { transform: scale(0.96); opacity: 0.8; }

#swipe-hint {
  position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 10px);
  left: 0; right: 0; text-align: center; font-size: 12px; opacity: 0.4; padding: 0 40px;
  line-height: 1.4;
}

/* ── UI Variations via classes on #app ────────────────────── */
/* .state-listen, .state-answer, .state-correct, .state-wrong, .state-retest */

</style>
</head>
<body>

<div class="switcher">
  <button class="sw-btn active" onclick="setState('idle')">Idle</button>
  <button class="sw-btn" onclick="setState('listen')">Listen</button>
  <button class="sw-btn" onclick="setState('answer')">Answer</button>
  <button class="sw-btn" onclick="setState('correct')">Correct</button>
  <button class="sw-btn" onclick="setState('wrong')">Wrong</button>
  <button class="sw-btn" onclick="setState('retest')">Retest</button>
</div>

<div id="app">
  <div id="phase-label">Listen</div>

  <div id="upper">
    <div class="lcd-display">
      <div id="diff-value">5.0¢</div>
      <div id="diff-word">difference</div>
    </div>
  </div>

  <div id="circles">
    <div class="note-row">
      <div class="note-circle" id="nc-left">
        <div class="nc-name">G4</div>
        <div class="nc-detail" id="det-left"></div>
      </div>
      <div class="note-circle" id="nc-right">
        <div class="nc-name">G4</div>
        <div class="nc-detail" id="det-right"></div>
      </div>
    </div>
    
    <button id="replay-btn">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
    </button>
  </div>

  <div id="lower">
    <div id="progress-row">
      <div class="prog-dot done"></div>
      <div class="prog-dot"></div>
      <div class="prog-dot"></div>
    </div>

    <div id="status-msg">Tap the higher note</div>

    <div id="actions">
      <button class="btn btn-outline">Retry</button>
      <button class="btn btn-primary">Continue</button>
    </div>

    <div id="swipe-hint">
      Tap higher note, or swipe up/down if 2nd note is higher/lower.
    </div>
  </div>
</div>

<script>
function setState(s) {
  const app = document.getElementById('app');
  const phase = document.getElementById('phase-label');
  const status = document.getElementById('status-msg');
  const actions = document.getElementById('actions');
  const left = document.getElementById('nc-left');
  const right = document.getElementById('nc-right');
  const detL = document.getElementById('det-left');
  const detR = document.getElementById('det-right');
  const btns = document.querySelectorAll('.sw-btn');

  // Reset
  app.classList.remove('retest');
  left.className = 'note-circle';
  right.className = 'note-circle';
  detL.textContent = '';
  detR.textContent = '';
  actions.style.display = 'none';
  status.className = '';
  
  btns.forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (s === 'idle') {
    phase.textContent = 'Ready';
    status.textContent = 'Tap to begin';
  } else if (s === 'listen') {
    phase.textContent = 'Listen';
    status.textContent = '';
    left.classList.add('playing');
    setTimeout(() => {
      left.classList.remove('playing');
      right.classList.add('playing');
    }, 1000);
  } else if (s === 'answer') {
    phase.textContent = 'Listen';
    status.textContent = 'Tap the higher note';
  } else if (s === 'correct') {
    phase.textContent = 'Listen';
    status.textContent = 'Correct';
    status.classList.add('status-correct');
    left.classList.add('correct');
    right.classList.add('correct');
    detR.textContent = '♯5.0¢';
  } else if (s === 'wrong') {
    phase.textContent = 'Listen';
    status.textContent = 'Wrong. The second note was higher.';
    status.classList.add('status-wrong');
    left.classList.add('wrong');
    right.classList.add('wrong');
    detR.textContent = '♯5.0¢';
    actions.style.display = 'flex';
  } else if (s === 'retest') {
    app.classList.add('retest');
    phase.textContent = 'Re-testing G4';
    status.textContent = 'Tap the higher note';
  }
}
</script>

</body>
</html>
